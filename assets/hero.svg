<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 440" role="img" aria-label="arshad — i ship tools for hackers">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="60%" stop-color="#0d0d14"/>
      <stop offset="100%" stop-color="#11111a"/>
    </linearGradient>

    <linearGradient id="headline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22dd88"/>
      <stop offset="55%" stop-color="#6ba1ff"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>

    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22dd88" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22dd88" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="orb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#6ba1ff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6ba1ff" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="orb2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#c084fc" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0"/>
    </radialGradient>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a24" stroke-width="0.8"/>
    </pattern>

    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.2" fill="#22dd88" fill-opacity="0.18"/>
    </pattern>
  </defs>

  <!-- backdrop -->
  <rect width="1200" height="440" fill="url(#bg)"/>
  <rect width="1200" height="440" fill="url(#grid)"/>
  <rect width="1200" height="440" fill="url(#dots)"/>

  <!-- soft colored orbs (no animation) -->
  <ellipse cx="160"  cy="120" rx="280" ry="170" fill="url(#orb)"/>
  <ellipse cx="1080" cy="340" rx="320" ry="180" fill="url(#orb2)"/>

  <!-- top status pill -->
  <g transform="translate(484,52)">
    <rect x="0" y="0" width="232" height="32" rx="16" fill="#13131a" stroke="#22dd88" stroke-opacity="0.5" stroke-width="1"/>
    <circle cx="20" cy="16" r="4" fill="#22dd88"/>
    <circle cx="20" cy="16" r="7" fill="#22dd88" fill-opacity="0.25"/>
    <text x="36" y="21" fill="#22dd88" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600" letter-spacing="1.5">
      6 SAAS LIVE · SHIPPING
    </text>
  </g>

  <!-- headline -->
  <text x="600" y="180" text-anchor="middle"
        fill="url(#headline)"
        font-family="ui-sans-serif, system-ui, -apple-system, 'Inter', sans-serif"
        font-size="68" font-weight="800" letter-spacing="-1.5">
    i ship tools for hackers.
  </text>

  <!-- subheadline -->
  <text x="600" y="226" text-anchor="middle"
        fill="#a0a0b8"
        font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="18" font-weight="500" letter-spacing="0.5">
    arshad · @codermak · builder · hunter · berlin 🇩🇪
  </text>

  <!-- tool chips row -->
  <g transform="translate(0,290)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" font-weight="600">
    <!-- iScan -->
    <g transform="translate(180,0)">
      <rect width="118" height="34" rx="17" fill="#13131a" stroke="#22dd88" stroke-opacity="0.55"/>
      <text x="59" y="22" text-anchor="middle" fill="#22dd88">🔍 iscan.today</text>
    </g>
    <!-- iSpy -->
    <g transform="translate(310,0)">
      <rect width="118" height="34" rx="17" fill="#13131a" stroke="#6ba1ff" stroke-opacity="0.55"/>
      <text x="59" y="22" text-anchor="middle" fill="#6ba1ff">👀 ispy.today</text>
    </g>
    <!-- iSsl -->
    <g transform="translate(440,0)">
      <rect width="118" height="34" rx="17" fill="#13131a" stroke="#ffb347" stroke-opacity="0.55"/>
      <text x="59" y="22" text-anchor="middle" fill="#ffb347">🔒 issl.today</text>
    </g>
    <!-- iLink -->
    <g transform="translate(570,0)">
      <rect width="124" height="34" rx="17" fill="#13131a" stroke="#c084fc" stroke-opacity="0.55"/>
      <text x="62" y="22" text-anchor="middle" fill="#c084fc">🔗 ilink.today</text>
    </g>
    <!-- GhRev -->
    <g transform="translate(706,0)">
      <rect width="116" height="34" rx="17" fill="#13131a" stroke="#22d3ee" stroke-opacity="0.55"/>
      <text x="58" y="22" text-anchor="middle" fill="#22d3ee">🤖 ghrev.com</text>
    </g>
    <!-- iBlockBots -->
    <g transform="translate(834,0)">
      <rect width="170" height="34" rx="17" fill="#13131a" stroke="#ff6b6b" stroke-opacity="0.55"/>
      <text x="85" y="22" text-anchor="middle" fill="#ff6b6b">🚫 iblockbots.today</text>
    </g>
  </g>

  <!-- bottom stats strip -->
  <g transform="translate(0,378)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" font-weight="600" letter-spacing="2.5">
    <text x="300" y="0" text-anchor="middle" fill="#22dd88">6 SAAS</text>
    <text x="300" y="20" text-anchor="middle" fill="#555568">SHIPPED</text>

    <text x="500" y="0" text-anchor="middle" fill="#6ba1ff">4</text>
    <text x="500" y="20" text-anchor="middle" fill="#555568">BOUNTY PLATFORMS</text>

    <text x="700" y="0" text-anchor="middle" fill="#c084fc">320+</text>
    <text x="700" y="20" text-anchor="middle" fill="#555568">PUBLIC REPOS</text>

    <text x="900" y="0" text-anchor="middle" fill="#ffb347">248</text>
    <text x="900" y="20" text-anchor="middle" fill="#555568">GH FOLLOWERS</text>
  </g>

  <!-- corner accents -->
  <path d="M 0 0 L 60 0 M 0 0 L 0 60" stroke="#22dd88" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <path d="M 1200 0 L 1140 0 M 1200 0 L 1200 60" stroke="#c084fc" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <path d="M 0 440 L 60 440 M 0 440 L 0 380" stroke="#6ba1ff" stroke-opacity="0.4" stroke-width="2" fill="none"/>
  <path d="M 1200 440 L 1140 440 M 1200 440 L 1200 380" stroke="#ff6b6b" stroke-opacity="0.4" stroke-width="2" fill="none"/>
</svg>
